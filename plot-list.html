<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot: my plots</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Plots</h1>
<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody id="plots-tbody">
    <!-- Table body comes here by JS -->
    </tbody>
</table>
<script type="module">
    import {fetchJsonOfPathnameApi, lowerHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const tbody = document.getElementById('plots-tbody');
    for (let item of data) {
        const tr = document.createElement("tr");
        const href = lowerHref(item.title);
        tr.innerHTML = `<td><a href="${href}">${item.title}</a></td><td>${item.description}</td>`
        tbody.appendChild(tr);
    }
</script>
<button id="plot-add-button" type="button">Add plot</button>
<form id="plot-add-form" style="display: none;">
    <fieldset>
        <legend>Basic Information</legend>
        <label for="title">Title</label><input id="title" name="title" required/>
        <label for="description">Description</label><input id="description" name="description"/>
    </fieldset>
    <fieldset>
        <legend>Privacy</legend>
        <label for="public">Public</label>
        <input id="public" name="access" required type="radio" value="public">
        <label for="private">Private</label>
        <input id="private" name="access" type="radio" value="private">
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script type="module">
    const plot_add_button = document.getElementById("plot-add-button");
    const plot_add_form = document.getElementById("plot-add-form");
    plot_add_button.addEventListener("click", () => {
        plot_add_form.style.display = "";
    });

    plot_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);
        const plotNewResponse = await fetch("/api" + window.location.pathname, {
            method: "POST",
            body: formData
        });
        if (plotNewResponse.ok) {
            window.location.reload();
        } else {
            alert("Unable to create a new plot.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
