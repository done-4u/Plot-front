<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot: my plots</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Plots</h1>
<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody id="plots-tbody">
    <!-- Table body comes here by JS -->
    </tbody>
</table>
<script type="module">
    import {fetchJsonOfPathnameApi} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const tbody = document.getElementById('plots-tbody');
    data.forEach(
        item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td><a href="plots/${item.title}">${item.title}</a></td><td>${item.description}</td>`
            tbody.appendChild(tr);
        }
    )
</script>
<a href="plots/new">New plot</a>
<script src="/common/navbar-global.js"></script>
</body>
</html>
