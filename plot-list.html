<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot: my plots</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<script defer src="/common/toggle-div.js"></script>
<div id="navbar-global-container"></div>
<h1>Plots</h1>
<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody id="plots-tbody">
    <!-- Table body comes here by JS -->
    </tbody>
</table>
<script type="module">
    import {fetchJsonOfPathnameApi, lowerHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const tbody = document.getElementById('plots-tbody');
    for (let item of data) {
        const tr = document.createElement("tr");
        const href = lowerHref(item.title);
        tr.innerHTML = `<td><a href="${href}">${item.title}</a></td><td>${item.description}</td>`
        tbody.appendChild(tr);
    }
</script>
<toggle-div button-text="Add plot">
    <form id="plot-add-form">
        <fieldset>
            <legend>Basic Information</legend>
            <label>
                Title
                <input name="title" required/>
            </label>
            <label>
                Description
                <input name="description"/>
            </label>
        </fieldset>
        <fieldset>
            <legend>Privacy</legend>
            <label>
                <input name="access" required type="radio" value="public"> Public
            </label>
            <label>
                <input name="access" type="radio" value="private"> Private
            </label>
        </fieldset>
        <button type="submit">Submit</button>
    </form>
</toggle-div>
<script type="module">
    const plot_add_form = document.getElementById("plot-add-form");
    plot_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);
        const response = await fetch("/api" + window.location.pathname, {
            method: "POST",
            body: formData
        });
        if (response.ok) {
            window.location.reload();
        } else {
            alert("Unable to create a new plot.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
