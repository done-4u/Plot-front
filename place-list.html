<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Places</h2>
<h3>List</h3>
<ul id="places-ul"></ul>
<button id="place-add-button" type="button">Add place</button>
<form id="place-add-form" style="display: none;">
    <label for="name">Name</label><input id="name" name="name" required/>
    <label for="description">Description</label><input id="description" name="description"/>
    <button type="submit">Submit</button>
</form>
<h3>Map</h3>
<div id="places-map-container"></div>
<script type="module">
    import {fetchJsonOfPathnameApi, lowerHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const places_ul = document.getElementById("places-ul");
    for (let item of data) {
        const name = item.name;
        const li = document.createElement("li");
        const a = document.createElement("a");

        li.appendChild(a);
        a.innerText = name;
        a.href = lowerHref(name);
        places_ul.appendChild(li);
    }

    const place_add_button = document.getElementById("place-add-button");
    const place_add_form = document.getElementById("place-add-form");
    place_add_button.addEventListener("click", () => {
        place_add_form.style.display = "";
    });

    place_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);
        const plotNewResponse = await fetch("/api" + window.location.pathname, {
            method: "POST",
            body: formData
        });
        if (plotNewResponse.ok) {
            window.location.reload();
        } else {
            alert("Unable to create a new place.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
