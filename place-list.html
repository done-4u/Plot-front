<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<script defer type="module" src="/common/toggle-div.js"></script>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Places</h2>
<h3>List</h3>
<ul id="places-ul"></ul>
<toggle-div button-text="Add place">
    <form id="place-add-form">
        <label>
            Name
            <input name="placeName" required/>
        </label>
        <label>
            Description
            <input name="description"/>
        </label>
        <button type="submit">Submit</button>
    </form>
</toggle-div>
<h3>Map</h3>
<div id="places-map-container"></div>
<script type="module">
    import {fetchJsonOfPathnameApi, lowerHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const places_ul = document.getElementById("places-ul");
    for (let item of data) {
        const name = item.placeName;
        const li = document.createElement("li");
        const a = document.createElement("a");

        li.appendChild(a);
        a.innerText = name;
        a.href = lowerHref(name);
        places_ul.appendChild(li);
    }

    const place_add_form = document.getElementById("place-add-form");
    place_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);
        const response = await fetch("/api" + window.location.pathname, {
            method: "POST",
            body: formData
        });
        if (response.ok) {
            window.location.reload();
        } else {
            alert("Unable to create a new place.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
