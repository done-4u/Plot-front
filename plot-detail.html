<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<script defer src="/common/controllable-input.js"></script>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Title</h2>
<controllable-input id="title-input"></controllable-input>
<h2>Description</h2>
<controllable-input id="description-input"></controllable-input>
<script type="module">
    import {fetchJsonOfPathnameApi} from "/common/utils.js";

    // TODO: add API
    const data = await fetchJsonOfPathnameApi();
    const title_input = document.getElementById("title-input");
    const description_input = document.getElementById("description-input");
    title_input.value = data.title;
    description_input.value = data.description;
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
