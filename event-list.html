<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Events</h2>
<table id="events-table"></table>
<script type="module">
    import {fetchJson} from "/common/utils.js";

    const apiPath = "/api" + window.location.pathname;
    const eventsPromise = fetchJson(apiPath);
    const timesPromise = fetchJson(apiPath.replace(/events(?!.*events)/, "times"))
    const placesPromise = fetchJson(apiPath.replace(/events(?!.*events)/, "places"));

    const events = await eventsPromise;
    const times = await timesPromise;
    const places = await placesPromise;

    let html = "<tr><th>Times\\Places</th>";
    for (let place of places) {
        html += `<th class="table-place-header">${place.name}</th>`;
    }
    html += "</tr>";
    for (let time of times) {
        console.log(time)
        if (time.order == 0) {
            continue;
        }
        html += "<tr>";
        html += `<th class="table-time-header">${time.order}</th>`;
        for (let place of places) {
            html += `<td data-timeOrder="${time.order}" data-placeName="${place.name}" contenteditable="true"></td>`;
        }
        html += "</tr>";
    }

    const table = document.getElementById("events-table");
    table.innerHTML = html;
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
