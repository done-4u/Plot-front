<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Events</h2>
<table id="events-table">
    <!-- will be filled by JS -->
</table>
<form id="event-add-form" style="display: none;">
    <div>
        <label for="event-add-form-time">Time</label><input id="event-add-form-time" name="timeOrder" readonly/>
        <label for="event-add-form-place">Place</label><input id="event-add-form-place" name="placeName" readonly/>
    </div>
    <div>
        <label for="event-add-form-input">Description</label><input id="event-add-form-input" name="description"/>
    </div>
    <button id="event-add-form-button" type="submit">Submit</button>
</form>
<script type="module">
    import {fetchJson} from "/common/utils.js";

    const apiPath = "/api" + window.location.pathname;
    const events = await fetchJson(apiPath);
    const times = await fetchJson(apiPath.replace(/events(?!.*events)/, "times"))
    const places = await fetchJson(apiPath.replace(/events(?!.*events)/, "places"));

    // convert event list to map
    const eventMap = new Map();
    for (let event of events) {
        const key = event.timeOrder;
        let placeMap;
        if (eventMap.has(key)) {
            placeMap = eventMap.get(key);
        } else {
            placeMap = new Map();
        }
        placeMap.set(event.placeName, event.description)
        eventMap.set(key, placeMap)
    }

    // first row
    const events_table = document.getElementById("events-table");
    let tr = document.createElement("tr");
    let th = document.createElement("th");
    th.innerText = "Times\\Places";
    tr.appendChild(th);
    for (let place of places) {
        th = document.createElement("th");
        th.innerText = place.name;
        tr.appendChild(th);
    }
    events_table.appendChild(tr);

    const event_add_form = document.getElementById("event-add-form");
    const event_add_form_time = document.getElementById("event-add-form-time");
    const event_add_form_place = document.getElementById("event-add-form-place");
    let activeCell = null;
    for (let time of times) {
        if (time.order == 0) {
            continue;
        }

        // first column
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.innerText = time.order;
        tr.appendChild(th);

        // actual table body
        for (let place of places) {
            const td = document.createElement("td");
            td.setAttribute("timeOrder", time.order);
            td.setAttribute("placeName", place.name);

            // event link or event add form
            if (eventMap.get(time.order)?.get(place.name)) {
                const a = document.createElement("a");
                a.href = `${window.location.pathname}/${time.order}/${place.name}`;
                a.innerText = "O"
                td.appendChild(a);
            } else {
                td.addEventListener("click", () => {
                    if (activeCell != null) {
                        activeCell.classList.remove("active")
                    }
                    activeCell = td;
                    td.classList.add("active");
                    event_add_form.style.display = "";
                    event_add_form_time.value = time.order
                    event_add_form_place.value = place.name;
                })
            }

            tr.appendChild(td);
        }
        events_table.appendChild(tr)
    }

    event_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(e.currentTarget);
        const response = await fetch("/api" + window.location.pathname, {method: "POST", body: formData})

        if (response.ok) {
            window.location.reload();
        } else {
            alert("Unable to add the event.")
        }
    });
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
