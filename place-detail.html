<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<script defer type="module" src="/common/confirm-button.js"></script>
<script defer type="module" src="/common/controllable-form.js"></script>
<script defer type="module" src="/common/toggle-div.js"></script>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Basic Information</h2>
<controllable-form id="name-form" inner-label-text="Name" inner-required></controllable-form>
<controllable-form id="description-form" inner-label-text="Description"></controllable-form>
<h2>Connections</h2>
<h3>Outbounds</h3>
<ul id="outbounds-ul"></ul>
<h3>Inbounds</h3>
<ul id="inbounds-ul"></ul>
<toggle-div button-text="Add connection">
    <form id="place-connection-add-form">
        <div>
            <label>
                <input name="direction" required type="radio" value="outbound"> Outbound
            </label>
            <label>
                <input name="direction" required type="radio" value="inbound"> Inbound
            </label>
        </div>
        <div>
            <label for="place-connection-add-form-select">Select place</label>
            <select id="place-connection-add-form-select" name="anotherPlaceName" required>
                <option>...</option>
                <!-- JS -->
            </select>
            <label>
                Description
                <input name="description">
            </label>
        </div>
        <div>
            <label>
                <input name="opposite" type="checkbox"> Automatically add opposite direction
            </label>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</toggle-div>
<svg viewBox="0 0 1000 600">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
            <polygon points="0 0, 10 5, 0 10" fill="black"/>
        </marker>
    </defs>
    <g id="svg-container"></g>
</svg>
<script type="module">
    const connections = await (await fetch("/api" + window.location.pathname + "/connections?direction=both")).json();
    let outbound_connections = [];
    let inbound_connections = [];

    const placeName = window.location.pathname.split("/").at(-1);
    for (let connection of connections) {
        if (connection.startPlaceName === placeName) {
            const obj = {name: connection.endPlaceName, description: connection.description}
            outbound_connections.push(obj);
        } else {
            const obj = {name: connection.startPlaceName, description: connection.description}
            inbound_connections.push(obj);
        }
    }

    const svg_container = document.getElementById("svg-container");

    const MIN_X = 0
    const MIN_Y = 0
    const MAX_X = 1000
    const MAX_Y = 600
    const CENTER_X = (MIN_X + MAX_X) / 2;
    const CENTER_Y = (MIN_Y + MAX_Y) / 2;

    const nodes = [{id: "center", name: placeName, x: CENTER_X, y: CENTER_Y, fx: CENTER_X, fy: CENTER_Y}];
    const links = [];

    inbound_connections.forEach((conn, i) => {
        const id = `in_${i}`;
        nodes.push({
            id, name: conn.name,
            x: MIN_X,
            y: MIN_Y + (MAX_Y - MIN_Y) / (inbound_connections.length + 1) * (i + 1),
            type: 'in'
        });
        links.push({source: id, target: "center", description: conn.description});
    });

    outbound_connections.forEach((conn, i) => {
        const id = `out_${i}`;
        nodes.push({
            id, name: conn.name,
            x: MAX_X,
            y: MIN_Y + (MAX_Y - MIN_Y) / (outbound_connections.length + 1) * (i + 1),
            type: 'out'
        });
        links.push({source: "center", target: id, description: conn.description});
    });

    const SPRING_LENGTH = 200;
    const SPRING_COEFFICIENT = 0.08;
    const REPULSION = 8000;
    const FRICTION_COEFFICIENT = 0.8;
    const BIAS_STRENGTH = 0.08;

    nodes.forEach(n => {
        n.vx = 0;
        n.vy = 0;
    });

    function updatePhysics() {
        // 1. Repulsion among all nodes
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const nodeA = nodes[i];
                const nodeB = nodes[j];
                const dx = nodeA.x - nodeB.x;
                const dy = nodeA.y - nodeB.y;
                const distSq = dx * dx + dy * dy || 1;
                const force = REPULSION / distSq;
                const fx = (dx / Math.sqrt(distSq)) * force;
                const fy = (dy / Math.sqrt(distSq)) * force;
                nodeA.vx += fx;
                nodeA.vy += fy;
                nodeB.vx -= fx;
                nodeB.vy -= fy;
            }
        }

        // 2. Attraction between pairs for each link
        links.forEach(link => {
            const s = nodes.find(n => n.id === link.source);
            const t = nodes.find(n => n.id === link.target);
            const dx = t.x - s.x;
            const dy = t.y - s.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = (dist - SPRING_LENGTH) * SPRING_COEFFICIENT;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            s.vx += fx;
            s.vy += fy;
            t.vx -= fx;
            t.vy -= fy;
        });

        // 3. Add left/right bias
        nodes.forEach(node => {
            if (node.fx !== undefined) return;

            // Left inbound, right outbound
            if (node.type === 'in') {
                node.vx += (MIN_X - node.x) * BIAS_STRENGTH;
            } else if (node.type === 'out') {
                node.vx += (MAX_X - node.x) * BIAS_STRENGTH;
            }

            node.vx *= FRICTION_COEFFICIENT;
            node.vy *= FRICTION_COEFFICIENT;
            node.x += node.vx;
            node.y += node.vy;
        });
    }

    const RECT_WIDTH = 90;
    const RECT_HEIGHT = 34;

    function render() {
        svg_container.innerHTML = '';
        links.forEach(link => {
            const s = nodes.find(n => n.id === link.source);
            const t = nodes.find(n => n.id === link.target);
            const midX = (s.x + t.x) / 2;
            const midY = (s.y + t.y) / 2;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${s.x} ${s.y} L ${midX} ${midY} L ${t.x} ${t.y}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "black");
            path.setAttribute("fill", "none");
            path.setAttribute("marker-mid", "url(#arrowhead)");
            svg_container.appendChild(path);

            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", midX);
            txt.setAttribute("y", midY - 10);
            txt.setAttribute("text-anchor", "middle");
            txt.setAttribute("font-size", "11px");
            txt.textContent = link.description;
            svg_container.appendChild(txt);
        });

        nodes.forEach(node => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", node.x - RECT_WIDTH / 2);
            rect.setAttribute("y", node.y - RECT_HEIGHT / 2);
            rect.setAttribute("width", RECT_WIDTH);
            rect.setAttribute("height", RECT_HEIGHT);
            rect.setAttribute("fill", "white");
            rect.setAttribute("stroke", "black");
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", node.x);
            txt.setAttribute("y", node.y);
            txt.setAttribute("text-anchor", "middle");
            txt.setAttribute("dominant-baseline", "middle");
            txt.textContent = node.name;
            g.appendChild(rect);
            g.appendChild(txt);
            svg_container.appendChild(g);
        });
    }

    function loop() {
        updatePhysics();
        render();
        requestAnimationFrame(loop);
    }

    loop();
</script>
<h2>Delete</h2>
<confirm-button id="delete-button" message="Are you sure to delete this place?">Delete</confirm-button>
<script type="module">
    import {fetchJson, fetchJsonOfPathnameApi, upperHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const name_form = document.getElementById("name-form");
    const description_form = document.getElementById("description-form");
    const placeName = data.placeName;

    name_form.innerValue = placeName;
    description_form.innerValue = data.description;

    const connections = await (await fetch("/api" + window.location.pathname + "/connections?direction=both")).json();
    const outbounds_ul = document.getElementById("outbounds-ul");
    const inbounds_ul = document.getElementById("inbounds-ul");
    for (let connection of connections) {
        const li = document.createElement("li");
        if (connection.startPlaceName === placeName) {
            li.innerText = `${connection.endPlaceName}: ${connection.description}`;
            outbounds_ul.appendChild(li);
        } else {
            li.innerText = `${connection.startPlaceName}: ${connection.description}`;
            inbounds_ul.appendChild(li);
        }
    }

    const delete_button = document.getElementById("delete-button");
    delete_button.addEventListener("click", async () => {
        const response = await fetch("/api" + window.location.pathname, {method: "DELETE"});
        if (response.ok) {
            window.location.pathname = upperHref()
        } else {
            alert("Unable to delete this place.");
        }
    });

    name_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const response = await fetch("/api" + window.location.pathname, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({"placeName": name_form.innerValue})
        });
        if (response.ok) {
            window.location.href = upperHref();
        } else {
            alert("Unable to change the place name.");
        }
    });

    description_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const response = await fetch("/api" + window.location.pathname, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({"description": description_form.innerValue})
        });
        if (response.ok) {
            window.location.reload();
        } else {
            alert("Unable to change the place description.");
        }
    });

    const place_connection_add_form_select = document.getElementById("place-connection-add-form-select");
    const places = await fetchJson("/api" + upperHref());
    for (let place of places) {
        const option = document.createElement("option");
        if (place.placeName === placeName) {
            continue;
        }
        option.value = place.placeName;
        option.innerText = place.placeName;
        place_connection_add_form_select.appendChild(option);
    }

    const place_connection_add_form = document.getElementById("place-connection-add-form");
    place_connection_add_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(e.currentTarget);

        const isOutbound = formData.get("direction") === "outbound";
        const isOppositeAlso = formData.get("opposite") !== null;
        const anotherPlaceName = formData.get("anotherPlaceName");
        const description = formData.get("description");

        if (isOutbound || isOppositeAlso) {
            const response = await fetch("/api" + window.location.pathname + "/connections", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    "endPlaceName": anotherPlaceName,
                    "description": description
                })
            });
            if (!response.ok) {
                window.alert("Unable to create a new connection.")
            }
        }
        if (!isOutbound || isOppositeAlso) {
            const tokens = window.location.pathname.split("/");
            tokens[tokens.length - 1] = anotherPlaceName.toString();
            const path = "/api" + tokens.join("/") + "/connections";
            const response = await fetch(path, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    "endPlaceName": placeName,
                    "description": description
                })
            });
            if (!response.ok) {
                window.alert("Unable to create a new connection.")
            }
        }
        window.location.reload();
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
