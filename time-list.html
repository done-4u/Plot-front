<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Times</h2>
<ul id="times-ol">
    <!-- Will be filled by JS -->
</ul>
<button id="time-add-button">Add time</button>
<script type="module">
    import {fetchJsonOfPathnameApi, fetchPostToPathnameApi} from "/common/utils.js";

    async function fetchAndRender() {
        const data = await fetchJsonOfPathnameApi();
        const times_ol = document.getElementById("times-ol");
        times_ol.replaceChildren();
        for (let item of data) {
            const li = document.createElement("li");
            li.innerText = `${item.timeOrder}. ${item.description}`;
            times_ol.appendChild(li);
        }
    }

    const time_add_button = document.getElementById("time-add-button");
    time_add_button.addEventListener("click", async () => {
        const response = await fetchPostToPathnameApi({});
        if (response.ok) {
            await fetchAndRender();
        } else {
            alert("Unable to create a new time.")
        }
    })

    fetchAndRender();
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
