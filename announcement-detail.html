<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-container"></div>
<h1>Announcement Detail</h1>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Datetime</th>
    </tr>
    </thead>
    <tbody id="announcement-tbody">
    <!-- Table body comes here by JS -->
    </tbody>
</table>
<h2>Content</h2>
<div id="content-container"></div>
<script>
    fetch("/api" + window.location.pathname, {headers: {"accept": "application/json"}})
        .then(response => response.json())
        .then(data => {
                const tbody = document.getElementById("announcement-tbody");
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${data.id}</td><td>${data.title}</td><td>${data.createdAt.split("T")[0]}</td>`;
                tbody.appendChild(tr)

                const content = document.getElementById("content-container")
                content.innerText = data.content
            }
        )
</script>
<script src="/common/navbar.js"></script>
</body>
</html>
