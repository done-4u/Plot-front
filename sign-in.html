<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Sign in</h1>
<form action="/api/sign-in" id="sign-in-form" method="post">
    <div>
        <label for="username">Username</label>
        <input id="username" name="username" required>
    </div>
    <div>
        <label for="password">Password</label>
        <input id="password" name="password" required type="password">
    </div>
    <button type="submit">Submit</button>
</form>
<div>
    <a href="/sign-up">Sign up</a>
    <a href="#">Forgot your Username/Password?</a>
</div>
<script type="module">
    import {fetchUsername} from "/common/utils.js";

    const signInForm = document.getElementById("sign-in-form");
    signInForm.addEventListener("submit", async (e) => {
        e.preventDefault()
        const formData = new FormData(e.currentTarget);
        const signInResponse = await fetch(e.currentTarget.action, {method: "POST", body: formData});
        if (signInResponse.ok) {
            const username = await fetchUsername()
            window.location.href = `/users/${username}/plots`;
        } else {
            alert("Unable to sign in.")
        }
    })
</script>
<script src="/common/ui-notifier.js"></script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
