<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Sign up</h1>
<form id="sign-up-form" action="/api/sign-up" method="post">
    <fieldset>
        <div>
            <label for="username">Username</label>
            <input id="username" minlength="3" name="username" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" required type="password">
        </div>
        <div>
            <label for="pw-again">Password again</label>
            <input id="pw-again" required type="password">
        </div>
    </fieldset>
    <fieldset>
        <div>
            <label for="email">Email</label>
            <input id="email" name="email" required type="email">
            <button>Send verification code</button>
        </div>
        <div>
            <label for="code">Verification code</label>
            <input id="code" required>
        </div>
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script type="module">
    const signUpForm = document.getElementById("sign-up-form");
    signUpForm.addEventListener("submit", async (e) => {
        e.preventDefault()
        const formData = new FormData(e.currentTarget);
        const signUpResponse = await fetch(e.currentTarget.action, {method: "POST", body: formData});
        if (signUpResponse.ok) {
            window.location.href = "/sign-in";
        } else {
            alert("Unable to sign up.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
