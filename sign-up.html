<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Sign up</h1>
<form action="/api/sign-up" id="sign-up-form" method="post">
    <fieldset>
        <div>
            <label>
                Username
                <input minlength="3" name="username" required>
            </label>
        </div>
        <div>
            <label>
                Password
                <input name="password" required type="password">
            </label>
        </div>
        <div>
            <label>
                Password again
                <input required type="password">
            </label>
        </div>
    </fieldset>
    <fieldset>
        <div>
            <label>
                Email
                <input name="email" required type="email">
            </label>
            <button>Send verification code</button>
        </div>
        <div>
            <label>
                Verification code
                <input required>
            </label>
        </div>
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script type="module">
    const signUpForm = document.getElementById("sign-up-form");
    signUpForm.addEventListener("submit", async (e) => {
        e.preventDefault()
        const formData = new FormData(e.currentTarget);
        const signUpResponse = await fetch(e.currentTarget.action, {method: "POST", body: formData});
        if (signUpResponse.ok) {
            window.location.href = "/sign-in";
        } else {
            alert("Unable to sign up.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
