<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<script defer src="/common/confirm-button.js"></script>
<script defer src="/common/controllable-form.js"></script>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2>Time & Place</h2>
<label for="time-input"></label><input disabled id="time-input"/>
<label for="place-input"></label><input disabled id="place-input"/>
<h2>Description</h2>
<controllable-form id="description-form"></controllable-form>
<h2>Delete</h2>
<confirm-button id="delete-button" message="Are you sure to delete this character?">Delete</confirm-button>
<script type="module">
    import {fetchJsonOfPathnameApi, upperHref} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const time_input = document.getElementById("time-input");
    const place_input = document.getElementById("place-input");
    const description_form = document.getElementById("description-form");
    time_input.value = data.timeOrder;
    place_input.value = data.placeName;
    description_form.innerValue = data.description;

    const delete_button = document.getElementById("delete-button");
    delete_button.addEventListener("click", async () => {
        const response = await fetch("/api" + window.location.pathname, {method: "DELETE"});
        if (response.ok) {
            window.location.pathname = upperHref()
        } else {
            alert("Unable to delete this event.");
        }
    });

    description_form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const response = await fetch("/api" + window.location.pathname, {
            method: "PATCH",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({"description": description_form.innerValue})
        });
        if (response.ok) {
            const pieces = window.location.pathname.split("/")
            pieces.pop();
            pieces.pop();
            window.location.href = pieces.join("/");
        } else {
            alert("Unable to change the event description.");
        }
    });
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
