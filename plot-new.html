<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot: new plot</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>New Plot</h1>
<form action="/api/users/{USERNAME}/plots" id="plot-new-form" method="post">
    <fieldset>
        <legend>Basic Information</legend>
        <div>
            <label for="title">Title</label>
            <input id="title" name="title" required>
        </div>
        <div>
            <label for="description">Description</label>
            <input id="description" name="description">
        </div>
    </fieldset>
    <fieldset>
        <legend>Access</legend>
        <div>
            <label for="public">Public</label>
            <input id="public" name="access" required type="radio" value="public">
            <label for="private">Private</label>
            <input id="private" name="access" type="radio" value="private">
        </div>
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script type="module">
    import {fetchUsername} from "/common/utils.js";

    const plotNewForm = document.getElementById("plot-new-form");
    plotNewForm.addEventListener("submit", async (e) => {
        e.preventDefault()
        const formData = new FormData(e.currentTarget);
        const username = await fetchUsername()
        const plotNewResponse = await fetch(e.currentTarget.action.replace("{USERNAME}", "username"), {
            method: "POST",
            body: formData
        });
        if (plotNewResponse.ok) {
            window.location.href = `/users/${username}/plots`;
        } else {
            alert("Unable to create a new plot.")
        }
    })
</script>
<script src="/common/navbar-global.js" type="module"></script>
</body>
</html>
