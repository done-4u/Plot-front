<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-global-container"></div>
<h1>Title</h1>
<div id="navbar-plot-container"></div>
<h2><span id="name-container"></span></h2>
<span id="description-container"></span>
<script type="module">
    import {fetchJsonOfPathnameApi} from "/common/utils.js";

    const data = await fetchJsonOfPathnameApi();
    const name_container = document.getElementById("name-container");
    const description_container = document.getElementById("description-container");
    name_container.innerText = data.name;
    description_container.innerText = data.description;
</script>
<script src="/common/navbar-global.js" type="module"></script>
<script src="/common/navbar-plot.js" type="module"></script>
</body>
</html>
