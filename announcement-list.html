<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plot, your story</title>
    <link href="/common/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar-container"></div>
<h1>Announcement List</h1>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Datetime</th>
    </tr>
    </thead>
    <tbody id="announcement-tbody">
    <!-- Table body comes here by JS -->
    </tbody>
</table>
<script type="module">
    import {fetchJson} from "/common/utils.js";

    const pinnedData = await fetchJson("/api/announcements?pinned=true")
    const tbody = document.getElementById("announcement-tbody");
    const children = pinnedData.map(item => {
        const tr = document.createElement("tr");
        const href = `announcements/${item.id}`;
        tr.innerHTML = `<td>📌</td><td><a href="${href}">${item.title}</a></td><td>${item.createdAt.split("T")[0]}</td>`;
        return tr
    })
    tbody.prepend(...children)

    const recentData = await fetchJson("/api/announcements")
    recentData.forEach(item => {
        const tr = document.createElement("tr");
        const href = `announcements/${item.id}`;
        tr.innerHTML = `<td>${item.id}</td><td><a href="${href}">${item.title}</a></td><td>${item.createdAt.split("T")[0]}</td>`
        tbody.appendChild(tr);
    })
</script>
<script src="/common/navbar.js"></script>
</body>
</html>
